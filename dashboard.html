<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Business Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #2d3748;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #f1f5f9;
        }
        .header p {
            color: #94a3b8;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .badge {
            display: inline-block;
            background: #1e2130;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #4f8ef7;
            border: 1px solid #2d3748;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .kpi-card {
            background: #1e2130;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .kpi-card h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        .kpi-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #f1f5f9;
        }
        .chart-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .chart-card {
            background: #1e2130;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .chart-card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f1f5f9;
        }
        .chart-container {
            height: 280px;
            position: relative;
        }
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .insight-card {
            background: #1e2130;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #2d3748;
            border-left: 4px solid;
        }
        .insight-card.accent { border-left-color: #4f8ef7; }
        .insight-card.success { border-left-color: #22c55e; }
        .insight-card.warning { border-left-color: #f59e0b; }
        .insight-card.danger { border-left-color: #ef4444; }
        .insight-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #f1f5f9;
        }
        .insight-card p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .table-container {
            background: #1e2130;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #2d3748;
            margin-bottom: 2rem;
            overflow-x: auto;
        }
        .table-container h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f1f5f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #0f1117;
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: #f1f5f9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 0.75rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
        tr:nth-child(even) {
            background: #161825;
        }
        .verdict-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .verdict-badge.true {
            background: #22c55e;
            color: #0f1117;
        }
        .verdict-badge.false {
            background: #ef4444;
            color: #fff;
        }
        .verdict-badge.inconclusive {
            background: #64748b;
            color: #fff;
        }
        .footer {
            text-align: center;
            padding: 2rem 0;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid #2d3748;
        }
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .chart-row {
                grid-template-columns: 1fr;
            }
            .insights-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="dashboardTitle"></h1>
            <p id="dashboardContext"></p>
            <span class="badge" id="modelBadge"></span>
        </div>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="chart-row">
            <div class="chart-card">
                <h2>Prediction Distribution</h2>
                <div class="chart-container">
                    <canvas id="predDistChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>Feature Importance</h2>
                <div class="chart-container">
                    <canvas id="featImpChart"></canvas>
                </div>
            </div>
        </div>

        <div class="insights-grid" id="insightsGrid"></div>

        <div class="table-container">
            <h2>Hypothesis Validation</h2>
            <table id="hypothesisTable"></table>
        </div>

        <div id="categoryBreakdown"></div>

        <div class="footer">
            <p>Generated by Auto Data Scientist v7 · CrewAI + Claude 3.5 Sonnet</p>
            <p id="timestamp"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        const DATA = {
            "title": "Late Delivery Risk — Business Dashboard",
            "context": "Supply chain operations dataset from DataCo Global with 180k orders.\nGoal: predict Late_delivery_risk (1 = late, 0 = on time) to help\noperations managers proactively flag at-risk shipments and prioritize\nexpedited handling. Key decisions: warehouse routing, carrier selection,\ncustomer communication.",
            "model_name": "XGBoost",
            "metric_label": "Accuracy",
            "metric_value": 97.45,
            "total_rows": 180519,
            "avg_conf": 97.6,
            "pred_dist": {
                "1.0": 103400,
                "0.0": 77119
            },
            "feat_imp": {
                "feat_ratio": 0.9904000163078308,
                "days_for_shipment_scheduled": 0.0013000000035390258,
                "aggressive_schedule": 0.0012000000569969416,
                "sales_per_scheduled_day": 0.0012000000569969416,
                "feat_interact": 0.0010999999940395355,
                "log_sales_per_customer": 0.0010999999940395355,
                "feat_diff": 0.0010000000474974513,
                "days_for_shipping_real": 0.0010000000474974513
            },
            "hypotheses": [
                {
                    "id": "H1",
                    "verdict": "FALSE",
                    "statement": "Orders with higher days_for_shipping_real tend to have higher late_delivery_risk",
                    "insight": "The business should investigate why 3-4 day shipping windows have dramatically lower late delivery risk compared to both"
                },
                {
                    "id": "H2",
                    "verdict": "TRUE",
                    "statement": "Orders with lower days_for_shipment_scheduled tend to have higher late_delivery_risk",
                    "insight": "The business should allocate more days for shipment scheduling (3-4 days) to significantly reduce late delivery risk fro"
                },
                {
                    "id": "H3",
                    "verdict": "TRUE",
                    "statement": "Orders where days_for_shipping_real exceeds days_for_shipment_scheduled tend to have higher late_del",
                    "insight": "The business should prioritize reducing shipping delays beyond scheduled times, as even a single day of delay results in"
                },
                {
                    "id": "H4",
                    "verdict": "TRUE",
                    "statement": "Orders with specific type values tend to have higher late_delivery_risk",
                    "insight": "The business should prioritize orders paid via TRANSFER for on-time delivery resources, or investigate why PAYMENT, DEBI"
                },
                {
                    "id": "H5",
                    "verdict": "INCONCLUSIVE",
                    "statement": "Orders from certain markets tend to have higher late_delivery_risk",
                    "insight": "Late delivery risk is consistently around 54-55% across all markets, suggesting that delivery performance issues are sys"
                },
                {
                    "id": "H6",
                    "verdict": "FALSE",
                    "statement": "Orders from specific customer_segment categories tend to have higher late_delivery_risk",
                    "insight": "Late delivery risk is uniformly distributed across customer segments at approximately 55%, suggesting delivery issues ar"
                },
                {
                    "id": "H7",
                    "verdict": "TRUE",
                    "statement": "Orders from certain department_name categories tend to have higher late_delivery_risk",
                    "insight": "The business should prioritize improving fulfillment processes for Pet Shop and Book Shop departments, potentially by al"
                },
                {
                    "id": "H8",
                    "verdict": "TRUE",
                    "statement": "Orders from specific category_name groups tend to have higher late_delivery_risk",
                    "insight": "The business should prioritize improving logistics and delivery processes for high-risk categories like Golf Bags & Cart"
                },
                {
                    "id": "H9",
                    "verdict": "INCONCLUSIVE",
                    "statement": "Orders with shipping routes between different order_country and customer_country tend to have higher",
                    "insight": "Without the baseline late delivery risk for domestic orders, we cannot yet determine if cross-border shipping requires a"
                },
                {
                    "id": "H10",
                    "verdict": "TRUE",
                    "statement": "Orders with lower benefit_per_order tend to have higher late_delivery_risk due to lower priority han",
                    "insight": "The business should consider prioritizing high-value orders in their logistics operations to maintain service quality fo"
                }
            ],
            "insights": [
                {
                    "title": "Model Performance",
                    "body": "TITLE: Late Deliveries Plague Half Our Orders\n\nBODY: Our model reveals that 54.8% of all shipments are currently at risk of late delivery—a systemic problem impacting customer satisfaction and operational costs. The XGBoost classifier achieves 97.5% accuracy in predicting these delays, enabling oper"
                }
            ],
            "cat_breakdown": {
                "column": "type",
                "data": {
                    "CASH": 56.6,
                    "DEBIT": 57.2,
                    "PAYMENT": 57.5,
                    "TRANSFER": 57.4
                }
            },
            "true_hyp_count": 6,
            "false_hyp_count": 2,
            "inc_hyp_count": 2
        };

        // Set Chart.js defaults for dark theme
        Chart.defaults.color = '#94a3b8';

        // Helper functions
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function truncate(str, maxLen) {
            if (str.length <= maxLen) return str;
            return str.substring(0, maxLen) + '...';
        }

        // Populate header
        document.getElementById('dashboardTitle').textContent = DATA.title;
        document.getElementById('dashboardContext').textContent = truncate(DATA.context.replace(/\n/g, ' '), 120);
        document.getElementById('modelBadge').textContent = `${DATA.model_name} · ${DATA.metric_label} ${DATA.metric_value}%`;

        // Populate KPI cards
        const kpiData = [
            { label: 'Total Records', value: formatNumber(DATA.total_rows) },
            { label: 'Model Accuracy', value: DATA.metric_value + '%' },
            { label: 'Avg Confidence', value: DATA.avg_conf ? DATA.avg_conf + '%' : 'N/A' },
            { label: 'True Hypotheses', value: `${DATA.true_hyp_count}/${DATA.hypotheses.length}` }
        ];

        const kpiGrid = document.getElementById('kpiGrid');
        kpiData.forEach(kpi => {
            const card = document.createElement('div');
            card.className = 'kpi-card';
            card.innerHTML = `<h3>${kpi.label}</h3><div class="value">${kpi.value}</div>`;
            kpiGrid.appendChild(card);
        });

        // Prediction Distribution Chart
        const predDistCtx = document.getElementById('predDistChart').getContext('2d');
        const predLabels = Object.keys(DATA.pred_dist).map(k => k === '1.0' ? 'Late' : 'On Time');
        const predValues = Object.values(DATA.pred_dist);
        const predColors = Object.keys(DATA.pred_dist).map(k => k === '1.0' ? '#ef4444' : '#22c55e');

        new Chart(predDistCtx, {
            type: 'doughnut',
            data: {
                labels: predLabels,
                datasets: [{
                    data: predValues,
                    backgroundColor: predColors,
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: { size: 12 }
                        }
                    }
                }
            }
        });

        // Feature Importance Chart
        const featImpCtx = document.getElementById('featImpChart').getContext('2d');
        const featEntries = Object.entries(DATA.feat_imp).sort((a, b) => b[1] - a[1]);
        const featLabels = featEntries.map(e => e[0]);
        const featValues = featEntries.map(e => e[1]);

        new Chart(featImpCtx, {
            type: 'bar',
            data: {
                labels: featLabels,
                datasets: [{
                    label: 'Importance',
                    data: featValues,
                    backgroundColor: '#4f8ef7',
                    borderWidth: 0
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Importance Score'
                        },
                        grid: { color: '#2d3748' }
                    },
                    y: {
                        grid: { display: false }
                    }
                }
            }
        });

        // Business Insights
        const insightsGrid = document.getElementById('insightsGrid');
        const insightClasses = ['accent', 'success', 'warning', 'danger'];
        const insightIcons = ['📊', '🎯', '⚡', '💡'];

        DATA.insights.forEach((insight, idx) => {
            const card = document.createElement('div');
            card.className = `insight-card ${insightClasses[idx % insightClasses.length]}`;
            
            const title = insight.body.split('\n\n')[0].replace('TITLE: ', '');
            const body = insight.body.split('\n\n')[1] ? insight.body.split('\n\n')[1].replace('BODY: ', '') : '';
            
            card.innerHTML = `
                <h3>${insightIcons[idx % insightIcons.length]} ${title}</h3>
                <p>${body}</p>
            `;
            insightsGrid.appendChild(card);
        });

        // Hypothesis Table
        const table = document.getElementById('hypothesisTable');
        let tableHTML = `
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Verdict</th>
                    <th>Hypothesis</th>
                    <th>Business Insight</th>
                </tr>
            </thead>
            <tbody>
        `;

        DATA.hypotheses.forEach(hyp => {
            const verdictClass = hyp.verdict.toLowerCase();
            tableHTML += `
                <tr>
                    <td><strong>${hyp.id}</strong></td>
                    <td><span class="verdict-badge ${verdictClass}">${hyp.verdict}</span></td>
                    <td>${hyp.statement}</td>
                    <td>${hyp.insight}</td>
                </tr>
            `;
        });

        tableHTML += '</tbody>';
        table.innerHTML = tableHTML;

        // Category Breakdown Chart
        if (DATA.cat_breakdown && DATA.cat_breakdown.column) {
            const catDiv = document.getElementById('categoryBreakdown');
            const chartCard = document.createElement('div');
            chartCard.className = 'chart-card';
            chartCard.style.marginBottom = '2rem';
            chartCard.innerHTML = `
                <h2>Late Rate by ${DATA.cat_breakdown.column}</h2>
                <div class="chart-container">
                    <canvas id="catBreakdownChart"></canvas>
                </div>
            `;
            catDiv.appendChild(chartCard);

            const catCtx = document.getElementById('catBreakdownChart').getContext('2d');
            const catLabels = Object.keys(DATA.cat_breakdown.data);
            const catValues = Object.values(DATA.cat_breakdown.data);

            new Chart(catCtx, {
                type: 'bar',
                data: {
                    labels: catLabels,
                    datasets: [{
                        label: 'Late Rate (%)',
                        data: catValues,
                        backgroundColor: '#4f8ef7',
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Late Rate (%)'
                            },
                            grid: { color: '#2d3748' },
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Footer timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
