<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Late Delivery Risk — Business Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            line-height: 1.6;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: #94a3b8;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .badge {
            display: inline-block;
            background: #1e2130;
            color: #4f8ef7;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .kpi-card {
            background: #1e2130;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .kpi-card h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        .kpi-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
        }
        .section {
            background: #1e2130;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .section h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1.25rem;
        }
        .chart-container {
            height: 280px;
            position: relative;
        }
        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .insight-card {
            background: #262938;
            border-radius: 8px;
            padding: 1.25rem;
            border-left: 4px solid;
        }
        .insight-card.accent { border-left-color: #4f8ef7; }
        .insight-card.success { border-left-color: #22c55e; }
        .insight-card.warning { border-left-color: #f59e0b; }
        .insight-card.danger { border-left-color: #ef4444; }
        .insight-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }
        .insight-card p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th {
            background: #262938;
            color: #ffffff;
            font-weight: 600;
            text-align: left;
            padding: 0.75rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table td {
            padding: 0.75rem;
            border-bottom: 1px solid #2d3348;
            font-size: 0.9rem;
        }
        table tr:nth-child(even) {
            background: #1a1d2b;
        }
        table tr:hover {
            background: #262938;
        }
        .verdict-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .verdict-badge.true {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .verdict-badge.false {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .verdict-badge.inconclusive {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #2d3348;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .kpi-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .insights-grid {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="dashboardTitle"></h1>
            <p id="dashboardSubtitle"></p>
            <span class="badge" id="modelBadge"></span>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <h3>Total Records</h3>
                <div class="value" id="totalRecords"></div>
            </div>
            <div class="kpi-card">
                <h3>Model Accuracy</h3>
                <div class="value" id="modelAccuracy"></div>
            </div>
            <div class="kpi-card">
                <h3>Avg Confidence</h3>
                <div class="value" id="avgConfidence"></div>
            </div>
            <div class="kpi-card">
                <h3>True Hypotheses</h3>
                <div class="value" id="trueHypotheses"></div>
            </div>
        </div>

        <div class="section">
            <h2>Prediction Distribution</h2>
            <div class="chart-container">
                <canvas id="predDistChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>Feature Importance</h2>
            <div class="chart-container">
                <canvas id="featImpChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>Business Insights</h2>
            <div class="insights-grid" id="insightsGrid"></div>
        </div>

        <div class="section">
            <h2>Hypothesis Validation</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Verdict</th>
                            <th>Hypothesis</th>
                            <th>Business Insight</th>
                        </tr>
                    </thead>
                    <tbody id="hypothesesTable"></tbody>
                </table>
            </div>
        </div>

        <div class="section" id="catBreakdownSection" style="display:none;">
            <h2 id="catBreakdownTitle">Category Breakdown</h2>
            <div class="chart-container">
                <canvas id="catBreakdownChart"></canvas>
            </div>
        </div>

        <div class="footer">
            <p>Generated by Auto Data Scientist v7 · CrewAI + Claude 3.5 Sonnet</p>
            <p id="timestamp"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        const DATA = {
  "title": "Late Delivery Risk \u2014 Business Dashboard",
  "context": "Supply chain operations dataset from DataCo Global with 180k orders.\nGoal: predict Late_delivery_risk (1 = late, 0 = on time) to help\noperations managers proactively flag at-risk shipments and prioritize\nexpedited handling. Key decisions: warehouse routing, carrier selection,\ncustomer communication.",
  "model_name": "XGBoost",
  "metric_label": "Accuracy",
  "metric_value": 97.45,
  "total_rows": 180519,
  "avg_conf": 90.8,
  "pred_dist": {
    "1.0": 103400,
    "0.0": 77119
  },
  "feat_imp": {
    "feat_ratio": 0.9997000098228455,
    "days_for_shipment_scheduled": 9.999999747378752e-05,
    "shipping_efficiency": 9.999999747378752e-05,
    "feat_interact": 0.0,
    "days_for_shipping_real": 0.0,
    "shipping_time_interaction": 0.0,
    "feat_sum": 0.0,
    "feat_diff": 0.0
  },
  "hypotheses": [
    {
      "id": "H1",
      "verdict": "FALSE",
      "statement": "Orders with higher actual shipping days (days_for_shipping_real) tend to have higher late_delivery_r",
      "insight": "The business should focus on keeping shipping times at 3-4 days maximum, as delays beyond this threshold dramatically in"
    },
    {
      "id": "H2",
      "verdict": "TRUE",
      "statement": "Orders with lower scheduled shipping days (days_for_shipment_scheduled) tend to have higher late_del",
      "insight": "The business should either avoid offering 1-2 day shipping options or invest heavily in expedited logistics capabilities"
    },
    {
      "id": "H3",
      "verdict": "TRUE",
      "statement": "Orders where actual shipping days exceed scheduled days tend to have higher late_delivery_risk",
      "insight": "The business should prioritize reducing shipping delays as even a 1-day delay is strongly associated with late delivery "
    },
    {
      "id": "H4",
      "verdict": "TRUE",
      "statement": "Orders of specific transaction types (type) tend to have higher late_delivery_risk due to different ",
      "insight": "The business should prioritize resource allocation and handling procedures for PAYMENT, DEBIT, and CASH transactions whi"
    },
    {
      "id": "H5",
      "verdict": "INCONCLUSIVE",
      "statement": "Orders from specific markets (market) tend to have higher late_delivery_risk due to geographical and",
      "insight": "The consistently high late delivery risk across all markets (54-55%) indicates a systemic operational issue rather than "
    },
    {
      "id": "H6",
      "verdict": "TRUE",
      "statement": "Orders in specific product categories (category_name) tend to have higher late_delivery_risk due to ",
      "insight": "The business should prioritize improving logistics and inventory management for high-risk categories like Golf Bags & Ca"
    },
    {
      "id": "H7",
      "verdict": "FALSE",
      "statement": "Orders from specific customer segments (customer_segment) tend to have higher late_delivery_risk due",
      "insight": "Since all customer segments face similar late delivery risks, the business should focus on systemic operational improvem"
    },
    {
      "id": "H8",
      "verdict": "TRUE",
      "statement": "Orders from specific departments (department_name) tend to have higher late_delivery_risk due to ope",
      "insight": "The business should investigate operational processes in Pet Shop and Book Shop departments to identify bottlenecks and "
    },
    {
      "id": "H9",
      "verdict": "INCONCLUSIVE",
      "statement": "Orders shipped to specific countries (order_country) tend to have higher late_delivery_risk due to c",
      "insight": "The business should collect more data from these countries before making shipping policy decisions, as current patterns "
    },
    {
      "id": "H10",
      "verdict": "TRUE",
      "statement": "Orders with lower benefit per order (benefit_per_order) tend to have slightly higher late_delivery_r",
      "insight": "The business should consider implementing priority fulfillment processes for higher-value orders while investigating whe"
    }
  ],
  "insights": [
    {
      "title": "Model Performance",
      "body": "TITLE: Late Deliveries Predicted with Precision\n\nBODY: Our XGBoost model achieves 97% accuracy in predicting which of 180,000+ shipments will arrive late, with an average confidence of 91%. This enables operations teams to proactively flag at-risk orders before they become customer service problems."
    }
  ],
  "cat_breakdown": {
    "column": "type",
    "data": {
      "CASH": 56.6,
      "DEBIT": 57.2,
      "PAYMENT": 57.5,
      "TRANSFER": 57.4
    }
  },
  "true_hyp_count": 6,
  "false_hyp_count": 2,
  "inc_hyp_count": 2
};

        // Set Chart.js dark theme
        Chart.defaults.color = '#94a3b8';

        // Helper: format number with commas
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Helper: truncate text
        function truncate(str, maxLen) {
            if (str.length <= maxLen) return str;
            return str.substring(0, maxLen) + '...';
        }

        // Populate header
        document.getElementById('dashboardTitle').textContent = DATA.title;
        const contextFirstLine = DATA.context.split('\n')[0];
        document.getElementById('dashboardSubtitle').textContent = truncate(contextFirstLine, 120);
        document.getElementById('modelBadge').textContent = `${DATA.model_name} · ${DATA.metric_label} ${DATA.metric_value}%`;

        // Populate KPIs
        document.getElementById('totalRecords').textContent = formatNumber(DATA.total_rows);
        document.getElementById('modelAccuracy').textContent = `${DATA.metric_value}%`;
        document.getElementById('avgConfidence').textContent = DATA.avg_conf ? `${DATA.avg_conf}%` : 'N/A';
        const totalHyp = DATA.hypotheses.length;
        document.getElementById('trueHypotheses').textContent = `${DATA.true_hyp_count}/${totalHyp}`;

        // Prediction Distribution Chart
        const predLabels = [];
        const predValues = [];
        const predColors = [];
        for (const [key, value] of Object.entries(DATA.pred_dist)) {
            if (key === '0.0' || key === '0') {
                predLabels.push('On Time');
                predColors.push('#22c55e');
            } else {
                predLabels.push('Late');
                predColors.push('#ef4444');
            }
            predValues.push(value);
        }
        const ctxPred = document.getElementById('predDistChart').getContext('2d');
        new Chart(ctxPred, {
            type: 'doughnut',
            data: {
                labels: predLabels,
                datasets: [{
                    data: predValues,
                    backgroundColor: predColors,
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 15,
                            font: {
                                size: 12
                            }
                        }
                    }
                }
            }
        });

        // Feature Importance Chart
        const featEntries = Object.entries(DATA.feat_imp).sort((a, b) => b[1] - a[1]);
        const featLabels = featEntries.map(e => e[0]);
        const featValues = featEntries.map(e => e[1]);
        const ctxFeat = document.getElementById('featImpChart').getContext('2d');
        new Chart(ctxFeat, {
            type: 'bar',
            data: {
                labels: featLabels,
                datasets: [{
                    label: 'Importance Score',
                    data: featValues,
                    backgroundColor: '#4f8ef7',
                    borderWidth: 0
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Importance Score',
                            color: '#94a3b8'
                        },
                        grid: {
                            color: '#2d3348'
                        }
                    },
                    y: {
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });

        // Business Insights
        const insightsGrid = document.getElementById('insightsGrid');
        const icons = ['📊', '🎯', '⚡', '💡'];
        const styles = ['accent', 'success', 'warning', 'danger'];
        DATA.insights.forEach((insight, idx) => {
            const card = document.createElement('div');
            card.className = `insight-card ${styles[idx % styles.length]}`;
            const title = insight.body.includes('TITLE:') ? insight.body.split('TITLE:')[1].split('BODY:')[0].trim() : insight.title;
            const body = insight.body.includes('BODY:') ? insight.body.split('BODY:')[1].trim() : insight.body;
            card.innerHTML = `
                <h3>${icons[idx % icons.length]} ${title}</h3>
                <p>${body}</p>
            `;
            insightsGrid.appendChild(card);
        });

        // Hypothesis Validation Table
        const hypothesesTable = document.getElementById('hypothesesTable');
        DATA.hypotheses.forEach(hyp => {
            const tr = document.createElement('tr');
            const verdictClass = hyp.verdict.toLowerCase();
            tr.innerHTML = `
                <td><strong>${hyp.id}</strong></td>
                <td><span class="verdict-badge ${verdictClass}">${hyp.verdict}</span></td>
                <td>${hyp.statement}</td>
                <td>${hyp.insight}</td>
            `;
            hypothesesTable.appendChild(tr);
        });

        // Category Breakdown Chart (if exists)
        if (DATA.cat_breakdown && DATA.cat_breakdown.column) {
            document.getElementById('catBreakdownSection').style.display = 'block';
            document.getElementById('catBreakdownTitle').textContent = `Late Rate by ${DATA.cat_breakdown.column}`;
            const catLabels = Object.keys(DATA.cat_breakdown.data);
            const catValues = Object.values(DATA.cat_breakdown.data);
            const ctxCat = document.getElementById('catBreakdownChart').getContext('2d');
            new Chart(ctxCat, {
                type: 'bar',
                data: {
                    labels: catLabels,
                    datasets: [{
                        label: 'Late Rate (%)',
                        data: catValues,
                        backgroundColor: '#4f8ef7',
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Late Rate (%)',
                                color: '#94a3b8'
                            },
                            grid: {
                                color: '#2d3348'
                            },
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // Footer timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
